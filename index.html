<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FZ750 LOGGER</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100dvh; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            user-select: none;
        }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 6px; }
        .btn-group { display: flex; gap: 6px; }
        
        .connect-btn { background: #d11; color: white; border: none; padding: 6px 14px; font-size: 11px; font-weight: 900; border-radius: 20px; box-shadow: 0 0 10px rgba(221,17,17,0.4); cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; }
        .connect-btn.connected { background: #00e000; box-shadow: 0 0 15px rgba(0,224,0,0.6); }
        
        .mode-btn { background: #333; color: #aaa; border: 1px solid #555; padding: 6px 14px; font-size: 11px; font-weight: 900; border-radius: 20px; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; }
        .mode-btn.circuit { background: #e000e0; color: #fff; border-color: #e000e0; box-shadow: 0 0 10px rgba(224,0,224,0.5); }

        .header-title { font-size: 20px; font-weight: 900; font-style: italic; color: #e0e0e0; letter-spacing: 2px; text-align: right; }

        /* Box Style */
        .box { background: #121212; border: 1px solid #282828; border-radius: 10px; padding: 8px; box-shadow: inset 0 0 15px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.5); }

        /* Bank Section */
        .bank-container { text-align: center; width: 100%; margin-bottom: 6px; }
        .section-label { font-size: 11px; color: #8c8c8c; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        .bank-value-wrap { font-size: 60px; font-weight: 900; font-style: italic; line-height: 1; margin: 2px 0; font-family: 'Impact', sans-serif; }
        .bank-direction { font-size: 38px; margin-left: 4px; font-weight: 900; }
        .dir-L { color: #00e000; } .dir-R { color: #ff2222; }

        /* Indicator */
        .indicator-wrap { position: relative; width: 100%; margin: 6px 0; }
        .seg-container { display: flex; justify-content: center; align-items: center; gap: 2px; width: 100%; padding: 0 4px; }
        .seg-clip { height: 22px; flex: 1; background: #222; }
        .seg-l { clip-path: polygon(100% 0%, 35% 0%, 0% 50%, 35% 100%, 100% 100%, 65% 50%); }
        .seg-r { clip-path: polygon(0% 0%, 65% 0%, 100% 50%, 65% 100%, 0% 100%, 35% 50%); }
        .cursor-bar { position: absolute; top: -2px; width: 8px; height: 26px; background: #ffffff; border-radius: 3px; left: calc(50% - 4px); z-index: 10; }

        /* Max Rows */
        .max-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-bottom: 6px; }
        .max-box { display: flex; flex-direction: column; align-items: center; padding: 4px; background: #161616; cursor: pointer; }
        .max-title { font-size: 10px; color: #777; font-weight: bold; }
        .max-val { font-size: 22px; font-weight: 900; font-family: monospace; }

        /* Meters */
        .meters-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 6px; flex: 1; align-items: center; }
        .meter-wrapper { position: relative; width: 100%; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .meter-svg { width: 100%; height: 100%; }
        .meter-center-text { position: absolute; text-align: center; top: 55%; left: 50%; transform: translate(-50%, -50%); }
        .meter-num { font-size: 28px; font-weight: 900; font-family: monospace; line-height: 1; }
        .m-max-val { font-size: 9px; color: #ff0; font-family: monospace; margin-top: 2px; }

        /* Bottom Zone */
        .bottom-zone { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .info-table { width: 100%; border-collapse: collapse; }
        .info-table td { padding: 4px; font-size: 12px; font-weight: bold; }
        .text-green { color: #00e000; } .text-pink { color: #e000e0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="btn-group">
            <button class="connect-btn" id="connectBtn" onclick="connectBLE()">Connect</button>
            <button class="mode-btn" id="modeBtn" onclick="toggleMode()">TOUR</button>
        </div>
        <div class="header-title">FZ750 LOGGER</div>
    </div>

    <div class="box bank-container">
        <div class="section-label">Bank Angle</div>
        <div class="bank-value-wrap" id="bankText">0</div>
        <div class="indicator-wrap"><div class="cursor-bar" id="cursor"></div><div class="seg-container" id="segContainer"></div></div>
    </div>

    <div class="max-row">
        <div class="box max-box" onpointerdown="startReset('bank')" onpointerup="stopReset()">
            <span class="max-title">MAX BANK (HOLD)</span>
            <span class="max-val" id="maxBank">L0/R0°</span>
        </div>
        <div class="box volt-box" style="display:flex; flex-direction:column; align-items:center;">
            <span class="max-title">BATTERY</span>
            <span class="max-val" id="voltVal">0.0V</span>
        </div>
    </div>

    <div class="meters-row">
        <div class="box meter-wrapper" id="rpmArea" onpointerdown="startReset('rpm')" onpointerup="stopReset()">
            <svg class="meter-svg" viewBox="0 0 200 200">
                <path d="M 40 160 A 80 80 0 1 1 160 160" fill="none" stroke="#1a1a1a" stroke-width="8" />
                <line id="rpmNeedle" x1="100" y1="100" x2="45" y2="155" stroke="#ff2222" stroke-width="3" style="transform-origin: 100px 100px;" />
            </svg>
            <div class="meter-center-text">
                <div class="meter-num" id="rpmVal">0</div>
                <div class="m-max-val" id="maxRpm">MAX: 0</div>
            </div>
        </div>
        <div class="box meter-wrapper" id="spdArea" onpointerdown="startReset('spd')" onpointerup="stopReset()">
            <svg class="meter-svg" viewBox="0 0 200 200">
                <path d="M 40 160 A 80 80 0 1 1 160 160" fill="none" stroke="#1a1a1a" stroke-width="8" />
                <line id="speedNeedle" x1="100" y1="100" x2="45" y2="155" stroke="#ff2222" stroke-width="3" style="transform-origin: 100px 100px;" />
            </svg>
            <div class="meter-center-text">
                <div class="meter-num" id="speedVal">0</div>
                <div class="m-max-val" id="maxSpd">MAX: 0</div>
            </div>
        </div>
    </div>

    <div class="bottom-zone">
        <div class="box" id="infoBox" style="display:none;">
            <table class="info-table">
                <tr><td>LAP TIME</td><td class="text-green">01:22.15</td></tr>
                <tr><td>BEST LAP</td><td class="text-pink">01:20.78</td></tr>
            </table>
        </div>
    </div>

    <script>
        let state = { maxL:0, maxR:0, maxRpm:0, maxSpd:0, resetTimer:null };
        let isCircuitMode = false;

        // 長押しリセット機能
        function startReset(type) {
            state.resetTimer = setTimeout(() => {
                if(type === 'bank') { state.maxL=0; state.maxR=0; }
                else if(type === 'rpm') state.maxRpm=0;
                else if(type === 'spd') state.maxSpd=0;
                alert(type.toUpperCase() + " RESET!");
            }, 1500);
        }
        function stopReset() { clearTimeout(state.resetTimer); }

        function toggleMode() {
            isCircuitMode = !isCircuitMode;
            const btn = document.getElementById('modeBtn');
            btn.classList.toggle('circuit');
            btn.innerText = isCircuitMode ? 'CIRC' : 'TOUR';
            document.getElementById('infoBox').style.display = isCircuitMode ? 'block' : 'none';
        }

        // BLEデータ処理
        function handleDataChanged(event) {
            let d = new TextDecoder().decode(event.target.value).split(',');
            if(d.length < 6) return;
            let b = parseFloat(d[0]), rpm = parseInt(d[3]), spd = parseFloat(d[4]);
            
            // MAX値更新
            if(b < state.maxL) state.maxL = b; if(b > state.maxR) state.maxR = b;
            if(rpm > state.maxRpm) state.maxRpm = rpm; if(spd > state.maxSpd) state.maxSpd = spd;

            // DOM更新
            document.getElementById('bankText').innerHTML = Math.abs(b).toFixed(0) + `<span class="bank-direction ${b<0?'dir-L':'dir-R'}">${b<0?'L':'R'}</span>`;
            document.getElementById('maxBank').innerText = `L${Math.abs(state.maxL).toFixed(0)}/R${Math.abs(state.maxR).toFixed(0)}°`;
            document.getElementById('rpmVal').innerText = rpm;
            document.getElementById('maxRpm').innerText = 'MAX: ' + state.maxRpm;
            document.getElementById('speedVal').innerText = spd.toFixed(0);
            document.getElementById('maxSpd').innerText = 'MAX: ' + state.maxSpd;
            document.getElementById('voltVal').innerText = d[5] + 'V';
            
            // 針の回転
            document.getElementById('rpmNeedle').style.transform = `rotate(${(rpm/14000)*270}deg)`;
            document.getElementById('speedNeedle').style.transform = `rotate(${(spd/280)*270}deg)`;
        }

        async function connectBLE() {
            const device = await navigator.bluetooth.requestDevice({filters:[{name:'FZ750_LOGGER_BLE'}], optionalServices:['4fafc201-1fb5-459e-8fcc-c5c9c331914b']});
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('4fafc201-1fb5-459e-8fcc-c5c9c331914b');
            const char = await service.getCharacteristic('beb5483e-36e1-4688-b7f5-ea07361b26a8');
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', handleDataChanged);
            document.getElementById('connectBtn').innerText = "CONNECTED";
            document.getElementById('connectBtn').classList.add('connected');
        }

        // 初期化用：バンクバー構築
        (function init() {
            const container = document.getElementById('segContainer');
            for(let i=0; i<24; i++) {
                const seg = document.createElement('div');
                seg.className = `seg-clip ${i < 12 ? 'seg-l' : 'seg-r'}`;
                container.appendChild(seg);
            }
        })();
    </script>
</body>
</html>
