<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FZ750 LOGGER - FULL VERSION</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100dvh;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            user-select: none;
        }

        /* Top Bar Section */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 6px;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        .connect-btn {
            background: #d11;
            color: white;
            border: none;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 900;
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(221, 17, 17, 0.4);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .connect-btn.connected {
            background: #00e000;
            box-shadow: 0 0 15px rgba(0, 224, 0, 0.6);
        }

        .mode-btn {
            background: #333;
            color: #aaa;
            border: 1px solid #555;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .mode-btn.circuit {
            background: #e000e0;
            color: #fff;
            border-color: #e000e0;
            box-shadow: 0 0 10px rgba(224, 0, 224, 0.5);
        }

        .header-title {
            font-size: 20px;
            font-weight: 900;
            font-style: italic;
            color: #e0e0e0;
            letter-spacing: 2px;
            text-align: right;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        /* Box Layouts */
        .box {
            background: #121212;
            border: 1px solid #282828;
            border-radius: 10px;
            padding: 8px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6), 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* Bank Angle Section */
        .bank-container {
            text-align: center;
            width: 100%;
            margin-bottom: 6px;
        }

        .section-label {
            font-size: 11px;
            color: #8c8c8c;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .bank-value-wrap {
            font-size: 60px;
            font-weight: 900;
            font-style: italic;
            line-height: 1;
            margin: 2px 0;
            font-family: 'Impact', sans-serif;
            letter-spacing: 2px;
        }

        .bank-direction {
            font-size: 38px;
            margin-left: 4px;
            font-weight: 900;
        }

        .dir-L { color: #00e000; }
        .dir-R { color: #ff2222; }

        .indicator-wrap {
            position: relative;
            width: 100%;
            margin: 6px 0;
        }

        .seg-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
            width: 100%;
            padding: 0 4px;
        }

        .seg-clip {
            height: 22px;
            flex: 1;
            background: #222;
            transition: background 0.1s ease;
        }

        .seg-l { clip-path: polygon(100% 0%, 35% 0%, 0% 50%, 35% 100%, 100% 100%, 65% 50%); }
        .seg-r { clip-path: polygon(0% 0%, 65% 0%, 100% 50%, 65% 100%, 0% 100%, 35% 50%); }

        .indicator-scale {
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            margin-top: 4px;
            font-size: 10px;
            font-weight: bold;
            color: #555555;
        }

        .cursor-bar {
            position: absolute;
            top: -2px;
            width: 8px;
            height: 26px;
            background: #ffffff;
            border-radius: 3px;
            box-shadow: 0 0 10px #ffffff, 0 0 5px rgba(0, 0, 0, 0.8);
            left: calc(50% - 4px);
            transition: left 0.05s ease-out;
            z-index: 10;
        }

        /* Max Bank Row */
        .max-bank-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            margin-bottom: 6px;
        }

        .max-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            background: #161616;
            cursor: pointer;
        }

        .max-title {
            font-size: 10px;
            color: #777777;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .max-val {
            font-size: 22px;
            font-weight: 900;
            margin-top: 2px;
            font-family: monospace;
        }

        /* Meters */
        .meters-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 6px;
            flex: 1;
        }

        .meter-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .meter-svg { width: 100%; height: 100%; }

        .meter-center-text {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .meter-num {
            font-size: 28px;
            font-weight: 900;
            font-family: monospace;
            line-height: 1;
        }

        /* Bottom Info */
        .bottom-zone {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
        }

        .info-table td {
            padding: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .info-table tr:not(:last-child) {
            border-bottom: 1px solid #1f1f1f;
        }

        .info-icon-label {
            color: #8c8c8c;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-value-data {
            text-align: right;
            font-family: monospace;
            font-size: 14px;
        }

        .text-green { color: #00e000; }
        .text-pink { color: #e000e0; }

        .sub-info-row {
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 8px;
            width: 100%;
        }

        .volt-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6px;
        }

        .volt-display {
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            font-family: 'Impact', sans-serif;
            line-height: 1;
        }

        .volt-label-sub {
            font-size: 9px;
            color: #666;
            margin-top: 4px;
        }

        .sd-box {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 6px;
        }

        .sd-bar-container {
            display: flex;
            gap: 2px;
            margin-top: 6px;
            width: 100%;
        }

        .sd-bar-chunk {
            height: 8px;
            flex: 1;
            background: #222;
        }

        .sd-bar-chunk.active { background: #555; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="btn-group">
            <button class="connect-btn" id="connectBtn" onclick="connectBLE()">Connect</button>
            <button class="mode-btn" id="modeBtn" onclick="toggleMode()">TOUR</button>
        </div>
        <div class="header-title">FZ750 LOGGER</div>
    </div>

    <div class="box bank-container">
        <div class="section-label">Bank Angle</div>
        <div class="bank-value-wrap" id="bankText">0</div>
        <div class="indicator-wrap">
            <div class="cursor-bar" id="cursor"></div>
            <div class="seg-container" id="segContainer"></div>
        </div>
        <div class="indicator-scale">
            <span class="scale-val">-60°</span>
            <span class="scale-val">+60°</span>
        </div>
    </div>

    <div class="max-bank-row">
        <div class="box max-box" onpointerdown="startReset('maxL')" onpointerup="stopReset()">
            <span class="max-title">MAX LEFT</span>
            <span class="max-val" style="color:#00e000;">
                <span id="maxL">0</span>°
            </span>
        </div>
        <div class="box max-box" onpointerdown="startReset('maxR')" onpointerup="stopReset()">
            <span class="max-title">MAX RIGHT</span>
            <span class="max-val" style="color:#ff2222;">
                <span id="maxR">0</span>°
            </span>
        </div>
    </div>

    <div class="meters-row">
        <div class="box meter-wrapper" onpointerdown="startReset('rpm')" onpointerup="stopReset()">
            <svg class="meter-svg" viewBox="0 0 200 200">
                <g id="rpmTicks"></g>
                <line id="rpmNeedle" x1="100" y1="100" x2="45" y2="155" stroke="#ff2222" stroke-width="3" style="transform-origin: 100px 100px; transition: transform 0.1s;" />
            </svg>
            <div class="meter-center-text">
                <span class="meter-num" id="rpmVal">0</span>
            </div>
        </div>
        <div class="box meter-wrapper" onpointerdown="startReset('spd')" onpointerup="stopReset()">
            <svg class="meter-svg" viewBox="0 0 200 200">
                <g id="speedTicks"></g>
                <line id="speedNeedle" x1="100" y1="100" x2="45" y2="155" stroke="#ff2222" stroke-width="3" style="transform-origin: 100px 100px; transition: transform 0.1s;" />
            </svg>
            <div class="meter-center-text">
                <span class="meter-num" id="speedVal">0</span>
            </div>
        </div>
    </div>

    <div class="bottom-zone">
        <div class="box gps-lap-box">
            <table class="info-table">
                <tr>
                    <td class="info-icon-label">📡 GPS</td>
                    <td class="info-value-data text-green">3D FIX</td>
                </tr>
                <tr>
                    <td class="info-icon-label">⏱️ TOP SPEED</td>
                    <td class="info-value-data" id="topSpeedVal">0 km/h</td>
                </tr>
                <tr id="lapRow" style="display:none;">
                    <td class="info-icon-label">⏱️ LAP TIME</td>
                    <td class="info-value-data">00:00.00</td>
                </tr>
            </table>
        </div>
        <div class="sub-info-row">
            <div class="box volt-box">
                <div class="volt-display">
                    <span id="voltVal">0.0</span><span style="font-size:14px; color:#888;">v</span>
                </div>
                <div class="volt-label-sub">🔋 BATTERY</div>
            </div>
            <div class="box sd-box">
                <div class="sd-bar-container" id="sdBarContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let maxSpeed = 0;
        let maxRpm = 0;
        let maxL = 0;
        let maxR = 0;
        let resetTimer = null;
        let isCircuitMode = false;

        function startReset(type) {
            resetTimer = setTimeout(() => {
                if (type === 'maxL') {
                    maxL = 0;
                } else if (type === 'maxR') {
                    maxR = 0;
                } else if (type === 'rpm') {
                    maxRpm = 0;
                } else if (type === 'spd') {
                    maxSpeed = 0;
                }
                alert(type.toUpperCase() + " PEAK RESET");
            }, 1500);
        }

        function stopReset() {
            clearTimeout(resetTimer);
        }

        function toggleMode() {
            isCircuitMode = !isCircuitMode;
            const btn = document.getElementById('modeBtn');
            const row = document.getElementById('lapRow');
            btn.innerText = isCircuitMode ? 'CIRC' : 'TOUR';
            row.style.display = isCircuitMode ? 'table-row' : 'none';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('segContainer');
            for (let i = 0; i < 24; i++) {
                const seg = document.createElement('div');
                seg.className = `seg-clip ${i < 12 ? 'seg-l' : 'seg-r'}`;
                seg.id = `seg-${i}`;
                container.appendChild(seg);
            }
            buildTicks('rpmTicks');
            buildTicks('speedTicks');
            const sdContainer = document.getElementById('sdBarContainer');
            for (let i = 0; i < 16; i++) {
                const chunk = document.createElement('div');
                chunk.className = 'sd-bar-chunk' + (i < 11 ? ' active' : '');
                sdContainer.appendChild(chunk);
            }
        });

        function buildTicks(id) {
            const g = document.getElementById(id);
            for (let i = 0; i <= 14; i++) {
                const angle = -225 + (i * (270 / 14));
                const rad = (angle * Math.PI) / 180;
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", 100 + 80 * Math.cos(rad));
                line.setAttribute("y1", 100 + 80 * Math.sin(rad));
                line.setAttribute("x2", 100 + 72 * Math.cos(rad));
                line.setAttribute("y2", 100 + 72 * Math.sin(rad));
                line.setAttribute("stroke", "#444");
                line.setAttribute("stroke-width", "2");
                g.appendChild(line);
            }
        }

        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'FZ750_LOGGER_BLE' }],
                    optionalServices: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
                const char = await service.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    let d = new TextDecoder().decode(e.target.value).split(',');
                    if (d.length < 6) return;
                    
                    let bank = parseFloat(d[0]);
                    let rpm = parseInt(d[3]);
                    let speed = parseFloat(d[4]);
                    
                    if (bank < 0) {
                        maxL = Math.max(maxL, Math.abs(bank));
                    } else {
                        maxR = Math.max(maxR, bank);
                    }
                    maxSpeed = Math.max(maxSpeed, speed);
                    maxRpm = Math.max(maxRpm, rpm);

                    document.getElementById('bankText').innerHTML = `${Math.abs(bank).toFixed(0)}<span class="bank-direction ${bank < 0 ? 'dir-L' : 'dir-R'}">${bank < 0 ? 'L' : 'R'}</span>`;
                    document.getElementById('maxL').innerText = maxL.toFixed(0);
                    document.getElementById('maxR').innerText = maxR.toFixed(0);
                    document.getElementById('rpmVal').innerText = rpm;
                    document.getElementById('speedVal').innerText = speed.toFixed(0);
                    document.getElementById('topSpeedVal').innerText = `${maxSpeed.toFixed(0)} km/h`;
                    document.getElementById('voltVal').innerText = parseFloat(d[5]).toFixed(1);
                    document.getElementById('rpmNeedle').style.transform = `rotate(${Math.min(270, (rpm / 14000) * 270)}deg)`;
                    document.getElementById('speedNeedle').style.transform = `rotate(${Math.min(270, (speed / 280) * 270)}deg)`;
                });
                document.getElementById('connectBtn').innerText = "CONNECTED";
                document.getElementById('connectBtn').classList.add('connected');
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
